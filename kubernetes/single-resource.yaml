apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example
  template:
    metadata:
      labels:
        app: example
    spec:
      containers:
      - image: docker.io/bitnami/phpmyadmin:5.2.2-debian-12-r21@sha256:57d1a003942fe92a56a7d8c0725c58b6ea314bcc6dfcfc05c7cef332e13d1645
        imagePullPolicy: IfNotPresent
        
        